worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ────────────────────────────────────────────────
  log_format json_combined escape=json
    '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent"'
    '}';

  access_log /var/log/nginx/access.log json_combined;

  # ── Performance ────────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 10M;

  # ── Gzip compression ──────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             image/svg+xml font/woff2;

  # ── Rate limiting zones ───────────────────────────────────
  # Strict limit for AI report generation
  limit_req_zone $binary_remote_addr zone=reports_generate:10m rate=20r/s;
  # General API limit
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/s;
  # Auth endpoints
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # ── Upstream blocks ───────────────────────────────────────
  upstream web_upstream {
    server web:3000;
    keepalive 32;
  }

  upstream api_upstream {
    server api:3001;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────
  server {
    listen 80;
    server_name ventureforge.com www.ventureforge.com api.ventureforge.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── Main HTTPS server (Web) ───────────────────────────────
  server {
    listen 443 ssl http2;
    server_name ventureforge.com www.ventureforge.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.clerk.dev; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.clerk.dev wss://api.ventureforge.com https://api.ventureforge.com; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Static asset caching ─────────────────────────────────
    location /_next/static/ {
      proxy_pass http://web_upstream;
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    location /favicon.ico {
      proxy_pass http://web_upstream;
      add_header Cache-Control "public, max-age=86400";
      access_log off;
    }

    # ── Web app proxy ─────────────────────────────────────────
    location / {
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 90s;
    }
  }

  # ── API HTTPS server ──────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.ventureforge.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── Strict rate limit on AI generation ───────────────────
    location /api/v1/reports/generate {
      limit_req zone=reports_generate burst=5 nodelay;
      limit_req_status 429;

      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # ── WebSocket support ─────────────────────────────────────
    location /socket.io/ {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 300s;
    }

    # ── General API proxy ─────────────────────────────────────
    location / {
      limit_req zone=api_general burst=20 nodelay;

      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 90s;
    }
  }
}
