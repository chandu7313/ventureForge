groups:
  - name: ventureforge_alerts
    rules:
      - alert: APIHighErrorRate
        expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API High Error Rate (instance {{ $labels.instance }})"
          description: "API error rate is > 5% over the last 5 minutes. Current rate: {{ $value }}."

      - alert: ReportGenerationFailing
        expr: sum(rate(report_generation_total{status="failed"}[10m])) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High Report Generation Failure Rate"
          description: "Report generation failure rate > 0.1 for 5 minutes. Check AI services."

      - alert: QueueDepthHigh
        expr: active_report_jobs > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High BullMQ Queue Depth"
          description: "Queue depth is > 50 for 5 minutes. Current depth: {{ $value }}. Consider scaling workers."

      - alert: APILatencyHigh
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API Latency"
          description: "95th percentile latency is > 10s for the last 5 minutes. Current latency: {{ $value }}s."

      - alert: DBConnectionPoolExhausted
        expr: db_pool_available == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database Connection Pool Exhausted"
          description: "No available DB connections for 1 minute."
